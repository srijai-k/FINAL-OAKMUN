<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form | Oakridge MUN XVI</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=block" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@media (min-width: 769px) { html { zoom: 1.1; } }

    @keyframes navSlideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-18px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    :root {
      --navy:      #003057;
      --teal:      #30CDD7;
      --teal-dark: #1E96A5;
      --white:     #FAF5ED;
      --gold:      #BC9A6E;
    }

    html, body {
      font-family: 'Montserrat';
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      height: 100%;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 14px; left: 50%;
      transform: translateX(-50%); z-index: 200;
      animation: navSlideDown .45s cubic-bezier(0.4,0,0.2,1) both;
    }
    .nav-pill {
      display: flex; align-items: center; gap: 0;
      background: rgba(3,12,26,.9);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 100px; border: 1px solid rgba(250,245,237,.07);
      padding: 10px 10px 10px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(250,245,237,.04);
      white-space: nowrap;
    }
    .nav-logo {
      font-size: .92rem; font-weight: 800; letter-spacing: .16em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
    }
    .nav-logo span { color: var(--teal); }
    .nav-center { display: flex; align-items: center; flex-shrink: 0; margin-left: 20px; }
    .nav-links-group {
      display: flex; gap: 22px; list-style: none;
    }
    .nav-links-group.left  { padding: 0 18px 0 28px; }
    .nav-links-group.right { padding: 0 28px 0 18px; }
    .nav-links-group a {
      font-size: .64rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(250,245,237,.48); text-decoration: none; transition: color .2s;
    }
    .nav-links-group a:hover { color: var(--white); }
    .nav-mark {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0 6px;
    }
    .nav-mark img { width: 44px; height: 44px; object-fit: contain; opacity: .92; filter: drop-shadow(0 0 8px rgba(48,205,215,.35)); }
    .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 10px; }
    .nav-cta {
      background: linear-gradient(180deg,#30CDD7 0%,#1E96A5 100%);
      color: var(--navy); font-family: 'Montserrat';
      font-size: .72rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 18px;
      cursor: pointer; white-space: nowrap;
      transition: transform .18s, box-shadow .18s;
      box-shadow: 0 6px 18px rgba(2,20,26,0.06);
    }
    .nav-cta:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(2,20,26,0.08); }

    .menu-btn {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 36px; height: 36px;
      background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px;
    }
    .menu-btn span { display: block; width: 100%; height: 2px; background: var(--white); border-radius: 2px; transition: transform .2s, opacity .2s; }
    .menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-nav {
      position: fixed; top: 76px; left: 50%;
      transform: translateX(-50%) translateY(-20px) scale(0.95);
      width: calc(100% - 40px); max-width: 320px; z-index: 199;
      background: rgba(3,12,26,.97); backdrop-filter: blur(28px);
      padding: 16px 24px; border-radius: 20px;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity .35s, transform .35s cubic-bezier(0.175,0.885,0.32,1.2);
      border: 1px solid rgba(48,205,215,.2);
    }
    .mobile-nav.open { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; pointer-events: auto; }
    .mobile-nav a {
      font-size: .88rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(250,245,237,.75); text-decoration: none;
      padding: 18px 0; border-bottom: 1px solid rgba(250,245,237,.07); transition: color .2s;
    }
    .mobile-nav a:last-child { border-bottom: none; }
    .mobile-nav a:hover { color: var(--teal); }

    /* ── PAGE ── */
    html, body { height: auto; overflow-x: hidden; }

    /* ── BACK BUTTON ── */
    .back-btn {
      position: fixed;
      top: 18px; left: 22px;
      z-index: 300;
      display: flex; align-items: center; gap: 7px;
      background: rgba(3,12,26,.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(250,245,237,.1);
      border-radius: 100px;
      padding: 9px 16px 9px 12px;
      color: var(--white);
      font-family: 'Montserrat';
      font-size: .68rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s, transform .18s;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
    }
    .back-btn:hover { background: rgba(48,205,215,.18); transform: translateX(-2px); }
    .back-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .form-iframe-wrap {
      position: relative;
      top: 0; left: 0; right: 0;
      width: 100%;
      overflow: hidden;
    }
    .form-iframe-wrap iframe {
      width: 100%;
      height: 2200px;
      border: none;
      display: block;
      overflow: hidden;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html { zoom: 1; }
      .nav-center { display: none; }
      .nav-right .nav-cta { display: none; }
      .menu-btn { display: flex; }
      .form-iframe-wrap iframe { height: 2800px; }
      .back-btn { font-size: .62rem; padding: 8px 13px 8px 10px; top: 14px; left: 14px; }
    }
  </style>

</head>
<body>

  <!-- BACK BUTTON -->
  <a class="back-btn" href="/register.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Go Back
  </a>

  <!-- Mobile nav -->
  <div class="mobile-nav" id="mobileNav">
    <a href="/">Home</a>
    <a href="/committees.html">Committees</a>
    <a href="/secretariat.html">Secretariat</a>
    <a href="/#schedule">Schedule</a>
    <a href="/resources.html">Resources</a>
    <a href="/social-night.html">Social Night</a>
    <a href="/networking-hour.html">Networking Hour</a>
    <a href="/orphanage-initiative.html">Community Outreach</a>
  </div>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-pill">
      <a class="nav-logo" href="/">Oakridge <span>MUN</span></a>
      <div class="nav-center">
        <ul class="nav-links-group left">
          <li><a href="/">Home</a></li>
          <li><a href="/committees.html">Committees</a></li>
          <li><a href="/secretariat.html">Secretariat</a></li>
        </ul>
        <div class="nav-mark"><img src="logo.png" alt="Oakridge MUN" /></div>
        <ul class="nav-links-group right">
          <li><a href="/#schedule">Schedule</a></li>
          <li><a href="/resources.html">Resources</a></li>
          <li><a href="/register.html" class="active">Register</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <button class="nav-cta" onclick="window.location.href='/register.html'">Register</button>
      </div>
    </div>
  </nav>

  <!-- FORM EMBED — nav floats over top, page scrolls -->
  <div class="form-iframe-wrap">
    <iframe
      src="https://forms.office.com/r/kuJmtCrcSx?embed=true"
      title="Oakridge MUN XVI Registration Form"
      scrolling="no"
      allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen>
    </iframe>
  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const mobileNav = document.getElementById('mobileNav');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = mobileNav.classList.toggle('open');
      menuBtn.classList.toggle('open', isOpen);
    });
    document.addEventListener('click', (e) => {
      if (mobileNav.classList.contains('open') && !mobileNav.contains(e.target) && !menuBtn.contains(e.target)) {
        mobileNav.classList.remove('open');
        menuBtn.classList.remove('open');
      }
    });
  </script>


  <!-- Smooth Scrolling (Lenis) -->
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script>
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!isTouchDevice && !prefersReducedMotion) {
      const lenis = new Lenis({ lerp: 0.11, smoothWheel: true, wheelMultiplier: 0.95, normalizeWheel: true, infinite: false });
      function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
    }
  </script>
</body>
</html>
